# KSI -> collector -> pass-criteria map
# Source of truth: FedRAMP Consolidated Rules v2026.07.06.01 (provisional preview).
# mode: Auto (31) | Hybrid (10) | Manual (5)   ->   46 indicators total
# Class-varying indicators use the baseline (Class C) statement.
#
# Each indicator:
#   id / name / family / mode
#   collectors: list of { tool, ref }   (tool: arg | graph | defender_policy | sentinel | github | manual)
#   pass: condition the assertion engine checks
#   evidence: path to the per-indicator evidence payload
#   review_required: true for Manual (and set where a human must complete the call)

version: "2026.07.06.01"

indicators:

  # === KSI-PIY - Policy and Inventory (5) ===
  - id: KSI-PIY-GIV
    name: Generating Inventories
    family: KSI-PIY
    mode: Auto
    collectors:
      - { tool: arg, ref: collectors/arg/ksi-piy-giv.kql }
    pass: Real-time inventory of all information resources generated on demand from authoritative sources.
    evidence: out/sdr/ksi-piy-giv.json
    review_required: false

  - id: KSI-PIY-RES
    name: Reviewing Executive Support
    family: KSI-PIY
    mode: Manual
    collectors:
      - { tool: manual, ref: docs/manual/ksi-piy-res.md }
    pass: Executive support for security goals persistently reviewed and demonstrated.
    evidence: out/sdr/ksi-piy-res.json
    review_required: true

  - id: KSI-PIY-RIS
    name: Reviewing Investments in Security
    family: KSI-PIY
    mode: Manual
    collectors:
      - { tool: manual, ref: docs/manual/ksi-piy-ris.md }
    pass: Effectiveness of security investments persistently reviewed.
    evidence: out/sdr/ksi-piy-ris.json
    review_required: true

  - id: KSI-PIY-RSD
    name: Reviewing Security in the SDLC
    family: KSI-PIY
    mode: Hybrid
    collectors:
      - { tool: github, ref: collectors/github/ksi-piy-rsd.py }
      - { tool: defender_policy, ref: collectors/defender_policy/ksi-piy-rsd.json }
      - { tool: manual, ref: docs/manual/ksi-piy-rsd.md }
    pass: Security/privacy built into the SDLC, aligned to CISA Secure by Design; persistently reviewed.
    evidence: out/sdr/ksi-piy-rsd.json
    review_required: true

  - id: KSI-PIY-RVD
    name: Reviewing Vulnerability Disclosures
    family: KSI-PIY
    mode: Manual
    collectors:
      - { tool: manual, ref: docs/manual/ksi-piy-rvd.md }
